name: Release to PyPI

# Tag a release (v0.1.0, v0.2.0, ...) to build the wheel — frontend bundled —
# and publish it. Requires the PYPI_API_TOKEN repository secret (a PyPI API
# token scoped to the seam-studio project).
on:
  push:
    tags: ["v*"]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        run: npm ci && npm run build
        working-directory: frontend

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheel + sdist (frontend bundled)
        run: |
          pip install build
          python scripts/build_wheel.py --skip-frontend

      - name: Smoke-check the wheel
        # The SPA bundle is gitignored and only enters the wheel via
        # scripts/build_wheel.py — a wheel built any other way imports fine
        # but serves an API-only app, so the SPA presence must be a HARD gate.
        run: |
          pip install backend/dist/*.whl
          python - <<'EOF'
          from seam_studio.main import app  # noqa: F401 - import must succeed
          from seam_studio.core import paths

          index = paths.FRONTEND_DIST / "index.html"
          assert index.is_file(), f"SPA bundle missing from wheel: {index}"
          # Vite emits index.html + a JS chunk + a CSS file (3 files today);
          # anything below that means the assets/ dir did not make it in.
          n_static = sum(1 for p in paths.FRONTEND_DIST.rglob("*") if p.is_file())
          assert n_static >= 3, f"suspiciously small SPA bundle ({n_static} files)"
          js = list((paths.FRONTEND_DIST / "assets").glob("*.js"))
          assert js, "SPA assets/*.js missing from wheel"
          print(f"wheel imports OK; SPA bundle present ({n_static} files)")
          EOF
          seam-studio --help

      - name: Verify wheel version matches the tag
        # skip-existing below makes duplicate tag-event deliveries green, but
        # it would also silently "succeed" if the tag were pushed without
        # bumping pyproject (stale wheel already on PyPI). Pin the two together.
        run: |
          ls "backend/dist/seam_studio-${GITHUB_REF_NAME#v}-py3-none-any.whl"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: backend/dist
          # GitHub delivered the v0.1.1 tag event twice (8 min apart); the
          # loser's re-upload 400s on PyPI. Duplicates are a no-op, not a
          # failure — the version gate above keeps this from hiding real skips.
          skip-existing: true
