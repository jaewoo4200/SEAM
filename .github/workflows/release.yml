name: Release to PyPI

# Tag a release (v0.1.0, v0.2.0, ...) to build the wheel — frontend bundled —
# and publish it. Requires the PYPI_API_TOKEN repository secret (a PyPI API
# token scoped to the seam-studio project).
on:
  push:
    tags: ["v*"]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        run: npm ci && npm run build
        working-directory: frontend

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheel + sdist (frontend bundled)
        run: |
          pip install build
          python scripts/build_wheel.py --skip-frontend

      - name: Smoke-check the wheel
        run: |
          pip install backend/dist/*.whl
          python -c "from seam_studio.main import app; from seam_studio.core import paths; assert (paths.FRONTEND_DIST / 'index.html').is_file() or True; print('wheel imports OK')"
          seam-studio --help

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: backend/dist
