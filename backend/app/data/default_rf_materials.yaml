    builtin: true

  # ------------------------------------------------------------------ #
  # Human body radio material with literature presets (ISAC sensing).   #
  # Convention epsilon* = epsilon' - j*epsilon''; conductivity in S/m   #
  # via sigma = 2*pi*f*eps0*epsilon''. See human_material_literature.md #
  # in the reference bundle. Default = 28 GHz in-vivo skin.             #
  # ------------------------------------------------------------------ #
  - id: human_body
    display_name: Human body (skin 28 GHz)
    category: human
    model: constant
    relative_permittivity: 8.6
    conductivity_s_per_m: 19.0
    thickness_m: 0.002
    scattering_coefficient: 0.60
    xpd_coefficient: 0.10
    transmissive: false
    preview_color: "#ff7043"
    notes: In-vivo human skin at 28 GHz (Ghodgaonkar); recommended default human material for mmWave ISAC.
    builtin: true

  - id: human_body_skin22ghz
    display_name: Human body (skin 22 GHz)
    category: human
    model: constant
    relative_permittivity: 6.04
    conductivity_s_per_m: 17.61
    thickness_m: 0.002
    scattering_coefficient: 0.60
    xpd_coefficient: 0.10
    transmissive: false
    preview_color: "#ff8a65"
    notes: In-vivo human skin at 22 GHz (Tamyis/URSI).
    builtin: true

  - id: human_body_effective_mid
    display_name: Human body (effective mid)
    category: human
    model: constant
    relative_permittivity: 20.0
    conductivity_s_per_m: 10.0
    thickness_m: 0.04
    scattering_coefficient: 0.60
    xpd_coefficient: 0.10
    transmissive: false
    preview_color: "#ffab91"
    notes: Engineering sweep midpoint between skin-surface and bulk-body behavior.
    builtin: true

  - id: human_body_proxy
    display_name: Human body (legacy proxy)
    category: human
    model: constant
    relative_permittivity: 38.0
    conductivity_s_per_m: 1.5
    thickness_m: 0.04
    scattering_coefficient: 0.60
    xpd_coefficient: 0.10
    transmissive: false
    preview_color: "#ffccbc"
    notes: Historical placeholder proxy; kept for reproducing earlier runs (deprecated - prefer human_body).
    builtin: true
